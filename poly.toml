# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
]

[lint.typos]
extend_words = { ba = "ba", edn = "edn" }
extend_exclude = ["CHANGELOG.md"]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
] }
cargo = true

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.actionlint]
enabled = true

