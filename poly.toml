# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
]

[lint.typos]
extend_words = { ba = "ba", edn = "edn" }
extend_exclude = ["CHANGELOG.md"]

[lint.uncomment]
enabled = true
remove_todos = false
remove_fixme = false
remove_docs = false
use_default_ignores = true
preserve_patterns = [
    "SAFETY",
    "HACK",
    "WORKAROUND",
    "NOTE",
    "Copyright",
    "Licensed",
    "License",
    "SPDX",
    "Apache",
    "MIT",
    "WITHOUT WARRANTIES",
    "limitations under the License",
    "copyright",
    "licensed",
    "license",
    "apache",
    "you may not use this file except in compliance",
    "You may obtain a copy of the License",
    "you may obtain a copy of the license",
    "http://www.apache.org/licenses/LICENSE-2.0",
    "http://www.apache.org/licenses/license-2.0",
    "Unless required by applicable law",
    "unless required by applicable law",
    "distributed under the License",
    "distributed under the license",
    "AS IS",
    "as is",
    "without warranties",
    "specific language governing permissions",
    "limitations under the license",
]

[lint.markdown.rumdl]
disable = ["MD033", "MD041"]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
lint = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
] }
fmt = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/*.svg",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "fixtures/**",
    "node_modules/**",
    "npm-package/**",
    "pip-package/**",
    "target/**",
] }
cargo = true

[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.actionlint]
enabled = true
