
[global]
remove_todos = false                                                   # Remove TODO comments
remove_fixme = false                                                   # Remove FIXME comments
remove_docs = false
preserve_patterns = ["HACK", "WORKAROUND", "NOTE", "BUG", "IMPORTANT"]
use_default_ignores = true
respect_gitignore = true
traverse_git_repos = false


[languages.rust]
name = "Rust"
extensions = ["rs"]
comment_nodes = ["line_comment", "block_comment"]
doc_comment_nodes = ["doc_comment", "inner_doc_comment", "outer_doc_comment"]
preserve_patterns = ["unsafe", "SAFETY", "clippy::", "rustfmt::", "derive"]
remove_docs = false

[languages.python]
name = "Python"
extensions = ["py", "pyw", "pyi"]
comment_nodes = ["comment"]
doc_comment_nodes = ["expression_statement"]
preserve_patterns = ["mypy:", "type:", "noqa:", "pragma:", "pylint:", "flake8:"]
remove_docs = false

[languages.javascript]
name = "JavaScript"
extensions = ["js", "jsx", "mjs", "cjs"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["@ts-expect-error", "@ts-ignore", "webpack", "eslint", "prettier-ignore"]

[languages.typescript]
name = "TypeScript"
extensions = ["ts", "mts", "cts"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["@ts-expect-error", "@ts-ignore", "@ts-nocheck", "tslint:", "prettier-ignore"]

[languages.tsx]
name = "TypeScript JSX"
extensions = ["tsx"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["@ts-expect-error", "@ts-ignore", "@ts-nocheck", "jsx-"]

[languages.go]
name = "Go"
extensions = ["go"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["go:build", "go:generate", "go:embed", "+build", "nolint"]

[languages.java]
name = "Java"
extensions = ["java"]
comment_nodes = ["line_comment", "block_comment"]
doc_comment_nodes = ["block_comment"]
preserve_patterns = ["@Override", "@Deprecated", "@SuppressWarnings", "CHECKSTYLE:", "PMD:"]

[languages.c]
name = "C"
extensions = ["c", "h"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["\\brief", "\\param", "\\return", "\\warning", "NOLINT", "coverity"]

[languages.cpp]
name = "C++"
extensions = ["cpp", "cxx", "cc", "c++", "hpp", "hxx", "hh", "h++"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["\\brief", "\\param", "\\return", "\\warning", "NOLINT", "clang-format"]

[languages.json]
name = "JSON"
extensions = ["json"]
comment_nodes = []
doc_comment_nodes = []

[languages.jsonc]
name = "JSON with Comments"
extensions = ["jsonc"]
comment_nodes = ["comment"]
doc_comment_nodes = []
preserve_patterns = ["$schema"]

[languages.yaml]
name = "YAML"
extensions = ["yaml", "yml"]
comment_nodes = ["comment"]
doc_comment_nodes = []
preserve_patterns = ["yamllint", "ansible-lint", "$schema"]

[languages.hcl]
name = "HCL"
extensions = ["hcl", "tf", "tfvars"]
comment_nodes = ["comment"]
doc_comment_nodes = []
preserve_patterns = ["terraform", "tflint-ignore", "checkov:skip"]

[languages.make]
name = "Make"
extensions = ["mk"]
comment_nodes = ["comment"]
doc_comment_nodes = []
preserve_patterns = [".PHONY", "GNU Make"]

[languages.shell]
name = "Shell"
extensions = ["sh", "bash", "zsh"]
comment_nodes = ["comment"]
doc_comment_nodes = ["comment"]
preserve_patterns = ["shellcheck", "bash-completion", "#!/", "set -"]


[patterns."tests/**/*"]
remove_docs = true
remove_todos = true
remove_fixme = true

[patterns."**/*.generated.*"]
remove_docs = true
remove_todos = true
remove_fixme = true
preserve_patterns = []

[patterns."docs/**/*"]
remove_docs = false
remove_todos = false
remove_fixme = false

[patterns."**/migrations/**/*"]
remove_docs = false
preserve_patterns = ["IMPORTANT", "WARNING", "BREAKING"]
